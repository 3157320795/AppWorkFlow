<div class="absolute bottom-0 right-0 bg-primary text-on-primary p-2 rounded-full shadow-lg">

</div>

<span class="font-medium text-on-surface">数据备份/恢复</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<div class="h-px mx-6 bg-surface-container"></div>
<button class="w-full flex items-center justify-between p-6 hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="file_export">file_export</span>

</div>
<span class="material-symbols-outlined text-outline-variant group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<div class="h-px mx-6 bg-surface-container"></div>
<button class="w-full flex items-center justify-between p-6 hover:bg-error-container/20 transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-error" data-icon="delete_forever">delete_forever</span>

</div>

</button>
</div>

<div class="flex items-center justify-between p-6">

<div class="w-12 h-6 bg-surface-container-highest rounded-full relative cursor-pointer">

</div>
<div class="h-px mx-6 bg-surface-container"></div>
<button class="w-full flex items-center justify-between p-6 hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="info">info</span>
<span class="font-medium text-on-surface">关于应用</span>
</div>
<span class="text-on-surface-variant text-sm">v2.4.0</span>
</button>
</div>
